name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
      - name: Build APK (Force downgrade to match available SDK)
        run: |
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 29/g' variables.gradle
          sed -i 's/targetSdkVersion = 34/targetSdkVersion = 29/g' variables.gradle
          # Also patch the build.gradle to ignore missing SDK 30+ 
          # by relaxing dependency checks if necessary (or just using 29).
          ./gradlew assembleDebug
        working-directory: android
EOF
